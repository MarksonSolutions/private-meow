name: Sync com tulir/whatsmeow (PR automatico)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/tulir/whatsmeow.git || true
          git fetch upstream

      - name: Verifica commits novos
        id: check
        run: |
          BEHIND=$(git rev-list --count main..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

      - name: Cria branch sync + merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="sync-tulir-$DATE"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          if git merge upstream/main --no-edit; then
            echo "status=merged" >> $GITHUB_OUTPUT
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            git add -A
            git commit -m "merge: sync tulir/main (CONFLITOS)" || true
          fi
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Build check
        if: steps.merge.outputs.status == 'merged'
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run go build
        if: steps.merge.outputs.status == 'merged'
        run: go build ./...

      - name: Cria PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base main --head "${{ steps.merge.outputs.branch }}" \
            --title "Sync tulir/main (${{ steps.check.outputs.behind }} commits)" \
            --body "Auto-sync diario. Status: ${{ steps.merge.outputs.status }}" \
            || echo "PR ja existe"
